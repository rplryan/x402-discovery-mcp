services:
  - type: web
    name: x402-scout-relay
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python relay_server.py
    envVars:
      - key: DISCOVERY_API_URL
        value: https://x402-discovery-api.onrender.com
      - key: RELAY_PRICE_USD
        value: "0.003"
      - key: RELAY_MIN_TRUST_SCORE
        value: "50"
      - key: PORT
        value: "10000"
      - key: EVM_PRIVATE_KEY
        sync: false
